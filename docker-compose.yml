services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www
        depends_on:
            - db
        networks:
            - laravel-net

    web:
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel-net

    db:
        image: mysql:8.0
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: laravel
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        volumes:
            - db-data:/var/lib/mysql
        networks:
            - laravel-net
    
    mailpit:
        image: axllent/mailpit
        ports:
            - "8025:8025" # Web UI
            - "1025:1025" # SMTPポート
        networks:
            - laravel-net

volumes:
    db-data:

networks:
    laravel-net:
